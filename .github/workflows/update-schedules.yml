name: 교수 시간표 주간 갱신

on:
  schedule:
    # 매주 목요일 00:00 KST (= 수요일 15:00 UTC)
    - cron: "0 15 * * 3"
  workflow_dispatch: {}   # 수동 실행 버튼

permissions:
  contents: write

concurrency:
  group: update-schedules
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: |
          pip install -r scripts/requirements.txt
          python -m playwright install --with-deps chromium

      - name: 시간표 수집
        run: python scripts/scrape.py

      - name: 노션 동기화
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          if [ -n "$NOTION_TOKEN" ]; then
            pip install requests
            python scripts/notion_sync.py
          else
            echo "NOTION_TOKEN 시크릿 없음 — 노션 동기화 건너뜀"
          fi

      - name: 변경분 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/schedules.json)" ]; then
            git add data/schedules.json
            git commit -m "교수 시간표 자동 갱신 ($(date +%Y-%m-%d))"
            for i in 1 2 3 4; do
              git pull --rebase origin main && git push && break
              echo "push 재시도 $i..."; sleep 3
            done
          else
            echo "변경 사항 없음 — 커밋 생략"
          fi

      - name: 수집 문제 점검(문제 시 작업 실패 → 메일 알림)
        if: always()
        run: |
          if [ -s scrape_problems.txt ]; then
            echo "::error title=교수 시간표 수집 문제::아래 병원에서 문제가 발생했습니다(데이터는 기존 값 유지)"
            cat scrape_problems.txt
            exit 1
          fi
          echo "모든 병원 정상 수집 — 문제 없음"
