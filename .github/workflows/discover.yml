name: 구조 탐색 (discover)

on:
  workflow_dispatch: {}

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 의존성 설치
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium
      - name: 탐색 실행
        run: python scripts/discover3.py
