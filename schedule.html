<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MR 영업 스케줄러 | 교수 진료시간표 · 면담 일정</title>
<meta name="description" content="대학병원 정형외과·신경외과 교수 진료시간표를 비교하고, 공석 시간에 영업 면담 일정을 등록·관리하는 MR용 웹앱." />
<style>
  :root{
    --brand:#E0112E; --ink:#1d1d1f; --sub:#6b7280; --line:#e5e7eb; --bg:#f6f7f9; --card:#fff;
    --busy-bg:#fff1f2; --busy:#e11d48; --free-bg:#ecfdf5; --free:#059669; --free-ring:#a7f3d0;
    --blue:#2563eb; --blue-bg:#eff6ff; --green:#059669; --green-bg:#ecfdf5; --gray:#94a3b8; --gray-bg:#f1f5f9;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    -webkit-font-smoothing:antialiased;line-height:1.5}
  button{font-family:inherit;cursor:pointer}
  ::-webkit-scrollbar{height:9px;width:9px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:8px}

  header.top{background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
  .wrap{max-width:1080px;margin:0 auto;padding:0 16px}
  .hrow{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:12px 0}
  .logo{font-size:18px;font-weight:800;letter-spacing:-.3px}
  .logo .dot{color:var(--brand)}
  .sub{font-size:12px;color:var(--sub)}
  .tabs{display:flex;gap:4px}
  .tab{border:none;background:none;padding:10px 16px;font-size:14px;font-weight:700;color:var(--sub);
       border-bottom:2px solid transparent;margin-bottom:-1px}
  .tab.on{color:var(--ink);border-bottom-color:var(--brand)}
  main{max-width:1080px;margin:0 auto;padding:18px 16px}

  .filters{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
  .filters .frow{display:flex;gap:10px}
  .filters .frow .field{flex:1;min-width:0}
  .field.fw{width:100%}
  .field.fw .picker-btn{width:100%}
  .field{display:flex;flex-direction:column;gap:5px;position:relative}
  .field>label{font-size:11px;font-weight:800;color:var(--sub)}
  select,input,textarea{font-family:inherit;font-size:14px;border:1px solid var(--line);border-radius:11px;
    padding:9px 11px;background:#fff;color:var(--ink)}
  select:focus,input:focus,textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(224,17,46,.12)}
  .btn{border:none;border-radius:11px;padding:9px 16px;font-size:13px;font-weight:700}
  .btn.brand{background:var(--brand);color:#fff}
  .btn.ghost{background:#fff;border:1px solid var(--line);color:var(--ink)}
  .btn.soft{background:#f1f5f9;color:#475569}

  /* 교수 선택 팝오버 */
  .picker-btn{min-width:150px;display:flex;justify-content:space-between;align-items:center;gap:8px;
    border:1px solid var(--line);border-radius:11px;background:#fff;padding:9px 11px;font-size:14px;font-weight:600}
  .pop{position:absolute;top:100%;left:0;right:0;margin-top:6px;width:auto;max-height:50vh;overflow:auto;background:#fff;
    border:1px solid var(--line);border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.12);padding:6px;z-index:30}
  .pop label{display:flex;align-items:center;gap:8px;padding:8px;border-radius:8px;font-size:14px}
  .pop label:hover{background:#f8fafc}
  .pop .all{color:var(--brand);font-weight:800;font-size:12px;padding:6px 8px;background:none;border:none;text-align:left;width:100%}

  .legend{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--sub);margin:6px 2px 12px}
  .legend i{display:inline-block;width:13px;height:13px;border-radius:4px;vertical-align:-2px;margin-right:5px}
  .lg-busy{background:var(--busy-bg);outline:1px solid #fecdd3}
  .lg-free{background:var(--free-bg);outline:1px solid var(--free-ring)}

  .gridwrap{overflow-x:auto;border:1px solid var(--line);border-radius:16px;background:#fff}
  table.grid{border-collapse:collapse;width:100%;min-width:600px;font-size:14px}
  table.grid th,table.grid td{padding:7px 8px;text-align:center}
  table.grid thead th{background:#fafbfc;border-bottom:1px solid var(--line);vertical-align:bottom;min-width:118px}
  .pname{font-weight:800}
  .ptitle{font-size:11px;color:var(--sub);font-weight:600}
  .rowhead{position:sticky;left:0;background:#fff;border-right:1px solid var(--line);
    font-size:12px;font-weight:800;color:var(--sub);white-space:nowrap;text-align:left;min-width:74px;z-index:1}
  thead .corner{position:sticky;left:0;background:#fafbfc;z-index:2;border-right:1px solid var(--line)}
  .sep td,.sep th{border-top:2px solid #e2e8f0}
  .cell{border-top:1px solid #f1f5f9}
  .chip{display:block;width:100%;border-radius:9px;font-size:11px;font-weight:800;padding:7px 4px;border:none}
  .chip.busy{background:var(--busy-bg);color:var(--busy)}
  .chip.free{background:var(--free-bg);color:var(--free);box-shadow:inset 0 0 0 1px var(--free-ring)}
  .chip.free:hover{background:#d1fae5}
  .chip .mk{display:inline-block;width:6px;height:6px;border-radius:50%;vertical-align:1px;margin-right:3px}

  .note{font-size:12px;color:var(--sub);line-height:1.6;margin-top:12px}

  /* 캘린더 */
  .calbar{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px}
  .navbtn{width:32px;height:32px;border-radius:9px;border:none;background:none;color:#64748b;font-size:18px}
  .navbtn:hover{background:#f1f5f9}
  .caltitle{font-weight:800;min-width:120px;text-align:center}
  .seg{background:#f1f5f9;border-radius:11px;padding:3px;display:flex}
  .seg button{border:none;background:none;padding:6px 14px;font-size:12px;font-weight:800;color:#64748b;border-radius:8px}
  .seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.1)}

  .week{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
  .day{border:1px solid var(--line);background:#fff;border-radius:14px;padding:8px;min-height:120px}
  .day.today{border-color:var(--brand);box-shadow:0 0 0 1px rgba(224,17,46,.25)}
  .day h4{margin:0 0 8px;font-size:12px;font-weight:800;color:var(--sub)}
  .day.today h4{color:var(--brand)}
  .appt{width:100%;text-align:left;border:1px solid #eef2f7;background:#f8fafc;border-radius:9px;padding:7px;margin-bottom:6px}
  .appt .t{font-size:11px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .appt .m{display:flex;justify-content:space-between;align-items:center;margin-top:4px}
  .slotlab{font-size:10px;color:#94a3b8}

  .badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:800;padding:2px 7px;border-radius:999px}
  .badge .d{width:6px;height:6px;border-radius:50%}
  .b-planned{background:var(--blue-bg);color:var(--blue)} .b-planned .d{background:var(--blue)}
  .b-done{background:var(--green-bg);color:var(--green)} .b-done .d{background:var(--green)}
  .b-canceled{background:var(--gray-bg);color:var(--gray);text-decoration:line-through} .b-canceled .d{background:var(--gray)}

  .month{border:1px solid var(--line);border-radius:16px;overflow:hidden;background:#fff}
  .mhead{display:grid;grid-template-columns:repeat(7,1fr);background:#fafbfc;font-size:11px;font-weight:800;color:#94a3b8;text-align:center}
  .mhead div{padding:8px 0}
  .mgrid{display:grid;grid-template-columns:repeat(7,1fr)}
  .mcell{min-height:84px;border-top:1px solid #f1f5f9;border-right:1px solid #f1f5f9;padding:5px}
  .mcell .dn{font-size:11px;font-weight:700;color:#475569;margin-bottom:3px}
  .mcell.out{background:#fafbfc}.mcell.out .dn{color:#cbd5e1}
  .mcell.today .dn{color:var(--brand)}
  .mline{display:flex;align-items:center;gap:4px;width:100%;border:none;background:none;padding:1px 0;text-align:left}
  .mline .d{width:6px;height:6px;border-radius:50%;flex:none}
  .mline span{font-size:10px;color:#475569;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* 모달 */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;display:flex;align-items:flex-end;justify-content:center;padding:0}
  .modal{background:#fff;width:100%;max-width:440px;border-radius:22px 22px 0 0;padding:18px;box-shadow:0 -10px 40px rgba(0,0,0,.2)}
  .modal h3{margin:0 0 4px;font-size:17px}
  .mclose{float:right;border:none;background:none;font-size:22px;color:#94a3b8;line-height:1}
  .mctx{font-size:12px;color:var(--sub);margin:2px 0 12px}
  .fl{display:block;margin-bottom:10px}
  .fl>span{font-size:11px;font-weight:800;color:var(--sub)}
  .fl input,.fl select,.fl textarea{width:100%;margin-top:4px;min-width:0}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .two>.fl{min-width:0}
  .statusrow{display:flex;gap:8px;margin-top:4px}
  .statusrow button{flex:1;border-radius:11px;padding:9px 0;font-size:12px;font-weight:800;border:1px solid var(--line);background:#fff;color:#64748b}
  .statusrow button.on.s-planned{background:var(--blue-bg);color:var(--blue);border-color:var(--blue)}
  .statusrow button.on.s-done{background:var(--green-bg);color:var(--green);border-color:var(--green)}
  .statusrow button.on.s-canceled{background:var(--gray-bg);color:var(--gray);border-color:var(--gray)}
  .mfoot{display:flex;gap:8px;align-items:center;margin-top:16px}
  .empty{color:#9aa1ab;text-align:center;padding:36px}
  @media(min-width:560px){ .overlay{align-items:center;padding:16px} .modal{border-radius:22px} }
  /* 주간 날짜바 + 교수 리스트 (모바일 우선) */
  .weekbar{display:flex;align-items:center;gap:6px;margin-bottom:14px}
  .daychips{display:flex;gap:6px;overflow-x:auto;flex:1;padding:2px}
  .daychip{flex:0 0 auto;min-width:48px;border:1px solid var(--line);background:#fff;border-radius:13px;padding:7px 0;color:#64748b}
  .daychip .dw{display:block;font-size:11px;font-weight:700}
  .daychip .dd{display:block;font-size:17px;font-weight:800;margin-top:1px}
  .daychip.today{border-color:#fca5a5}
  .daychip.on{background:var(--brand);border-color:var(--brand);color:#fff}
  .grphdr{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:var(--brand);margin:16px 2px 8px}
  .grphdr:before{content:"";width:3px;height:13px;background:var(--brand);border-radius:2px}
  .popgrp{font-size:11px;font-weight:800;color:#94a3b8;padding:9px 8px 3px}
  .datehead{font-size:16px;font-weight:800;margin:2px 2px 12px}
  .datehead span{color:var(--sub);font-weight:700}
  .plist{display:flex;flex-direction:column;gap:9px}
  .pcard{display:flex;align-items:center;gap:10px;border:1px solid var(--line);background:#fff;border-radius:16px;padding:12px 13px}
  .pinfo{flex:1;min-width:0}
  .nm{font-weight:800}
  .nm .tt{font-size:12px;color:var(--sub);font-weight:600;margin-left:5px}
  .dtag{font-size:11px;font-weight:700;color:#0369a1;background:#e0f2fe;border-radius:6px;padding:1px 6px;margin-left:5px}
  .wkname .dtag{color:#0369a1}
  .sp{font-size:12px;color:var(--sub);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .slots{display:flex;gap:6px;flex:none}
  .slot{width:66px;border:none;border-radius:13px;padding:9px 4px;font-size:13px;font-weight:800;text-align:center;line-height:1.2}
  .slot .lab{display:block;font-size:10px;font-weight:700;color:#94a3b8;margin-bottom:3px}
  .slot .mk{display:inline-block;width:6px;height:6px;border-radius:50%;vertical-align:1px;margin-right:3px}
  .slot.busy{background:var(--busy-bg);color:var(--busy)} .slot.busy .lab{color:#fda4af}
  .slot.free{background:var(--free-bg);color:var(--free);box-shadow:inset 0 0 0 1px var(--free-ring)} .slot.free .lab{color:#34d399}
  .slot.free:active{background:#bbf7d0}
  /* 일주일 보기 */
  .schedseg{margin-bottom:12px}
  .wkhead,.wkrow{display:grid;grid-template-columns:32px repeat(5,1fr);gap:4px}
  .wkhead{margin-bottom:4px}
  .wkc{text-align:center}
  .wkc.wd{font-size:11px;font-weight:700;color:#64748b;line-height:1.05;padding:2px 0}
  .wkc.wd b{display:block;font-size:14px;color:#334155}
  .wkc.wd.td b{color:var(--brand)}
  .wkcard{border:1px solid var(--line);background:#fff;border-radius:14px;padding:10px;margin-bottom:9px}
  .wkname{font-weight:800;margin-bottom:7px;font-size:14px}
  .wkname>span{font-size:12px;color:var(--sub);font-weight:600;margin-left:4px}
  .wkname .sp{display:block;font-size:11px;color:var(--sub);font-weight:500;margin:2px 0 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .wkrow{margin-top:4px}
  .wkc.rl{font-size:10px;font-weight:800;color:#94a3b8;display:flex;align-items:center;justify-content:center}
  .wkc.cell{border:none;border-radius:8px;padding:8px 1px;font-size:10px;font-weight:800;line-height:1}
  .wkc.cell.busy{background:var(--busy-bg);color:var(--busy)}
  .wkc.cell.free{background:var(--free-bg);color:var(--free);box-shadow:inset 0 0 0 1px var(--free-ring)}
  .wkc.cell.free:active{background:#bbf7d0}
  .wkc.cell .mk{display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:2px;vertical-align:1px}
  @media(max-width:760px){ .week{grid-template-columns:1fr 1fr} .field{min-width:0;flex:1} .field select{width:100%} .picker-btn{min-width:0;width:100%}
    .slot{width:58px} .nm{font-size:15px} }
  .loginwrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .logincard{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:26px 22px;width:100%;max-width:360px;display:flex;flex-direction:column;gap:10px}
  .loginlogo{font-size:20px;font-weight:800}
  .loginsub{font-size:13px;color:var(--sub);margin-bottom:6px}
  .logincard input{border:1px solid var(--line);border-radius:11px;padding:11px 12px;font-size:15px;width:100%}
  .logincard input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(224,17,46,.12)}
  .logincard .btn{width:100%}
  .loginmsg{font-size:12px;font-weight:600;min-height:16px}
  .userbox{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .uemail{font-size:12px;color:#334155;font-weight:700}
</style>
</head>
<body>
<div id="root"></div>
<div id="modal-root"></div>

<script>
/* ===================== 상수/유틸 ===================== */
var DATA_URLS=["./data/schedules.json","https://raw.githubusercontent.com/soyeonlee528/woorien/main/data/schedules.json"];
var DAYS=["mon","tue","wed","thu","fri","sat","sun"], SDAYS=["mon","tue","wed","thu","fri"], DAY_KO={mon:"월",tue:"화",wed:"수",thu:"목",fri:"금",sat:"토",sun:"일"};
var SLOTS=[["AM","오전"],["PM","오후"]];
var STATUS={planned:["방문 예정","b-planned","s-planned"],done:["면담 완료","b-done","s-done"],canceled:["취소","b-canceled","s-canceled"]};
/* ===== Supabase (로그인 + 클라우드 저장) ===== */
var SUPA_URL="https://uwnkeyoemsssdfxgawyi.supabase.co";
var SUPA_KEY="sb_publishable_mOov6n4h60cDTnDcYXSr0Q_xPMxdEX7";
var SESS_KEY="mr_supa_session_v1";
function getSess(){try{return JSON.parse(localStorage.getItem(SESS_KEY));}catch(e){return null;}}
function setSess(s){if(s)localStorage.setItem(SESS_KEY,JSON.stringify(s));else localStorage.removeItem(SESS_KEY);}

function pad(n){return (n<10?"0":"")+n;}
function fmt(d){return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
function parseYmd(s){var p=String(s).split("-");return new Date(+p[0],+p[1]-1,+p[2]);}
function addDays(d,n){var x=new Date(d);x.setDate(x.getDate()+n);return x;}
function monIdx(d){return (d.getDay()+6)%7;}
function startWeek(d){return addDays(d,-monIdx(d));}
function todayYmd(){return fmt(new Date());}
function nextOcc(dayKey){var t=DAYS.indexOf(dayKey);var n=new Date();n.setHours(0,0,0,0);var diff=(t-monIdx(n)+7)%7;return fmt(addDays(n,diff));}
function esc(s){return (s==null?"":String(s)).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function authReq(path,body){return fetch(SUPA_URL+"/auth/v1/"+path,{method:"POST",headers:{apikey:SUPA_KEY,"Content-Type":"application/json"},body:JSON.stringify(body)}).then(function(r){return r.json().then(function(j){return {ok:r.ok,status:r.status,j:j};});});}
function saveAuth(j){setSess({token:j.access_token,refresh:j.refresh_token,email:(j.user&&j.user.email)||"",uid:(j.user&&j.user.id)||""});}
function doRefresh(){var s=getSess();if(!s||!s.refresh)return Promise.resolve(false);return authReq("token?grant_type=refresh_token",{refresh_token:s.refresh}).then(function(r){if(r.ok&&r.j.access_token){saveAuth(r.j);return true;}setSess(null);return false;});}
function rest(method,path,body,_retry){var s=getSess();var h={apikey:SUPA_KEY,Authorization:"Bearer "+(s?s.token:SUPA_KEY),"Content-Type":"application/json"};if(method!=="GET")h.Prefer="return=representation";
  return fetch(SUPA_URL+"/rest/v1/"+path,{method:method,headers:h,body:body?JSON.stringify(body):undefined}).then(function(r){
    if(r.status===401&&!_retry){return doRefresh().then(function(ok){if(ok)return rest(method,path,body,true);setSess(null);render();throw new Error("세션이 만료됐어요. 다시 로그인해 주세요.");});}
    if(r.status===204)return [];
    return r.json().then(function(j){if(!r.ok)throw new Error((j&&(j.message||j.msg||j.error_description))||("HTTP "+r.status));return j;});
  });}
function toRow(a){return {title:a.title,hospital_id:a.hospitalId,hospital_name:a.hospitalName,dept:a.dept,professor:a.professor,date:a.date,slot:a.slot,time:a.time,status:a.status,memo:a.memo};}
function fromRow(r){return {id:r.id,title:r.title,hospitalId:r.hospital_id,hospitalName:r.hospital_name,dept:r.dept,professor:r.professor,date:r.date,slot:r.slot,time:r.time,status:r.status,memo:r.memo};}
function loadAppointments(){return rest("GET","appointments?select=*").then(function(rows){S.appts=(rows||[]).map(fromRow);});}
function apptCreate(a){return rest("POST","appointments",toRow(a)).then(function(rows){if(rows&&rows[0])S.appts.push(fromRow(rows[0]));});}
function apptUpdate(a){return rest("PATCH","appointments?id=eq."+a.id,toRow(a)).then(function(rows){var i=-1;S.appts.forEach(function(x,k){if(x.id===a.id)i=k;});if(i>=0&&rows&&rows[0])S.appts[i]=fromRow(rows[0]);});}
function apptDelete(id){return rest("DELETE","appointments?id=eq."+id,null).then(function(){S.appts=S.appts.filter(function(x){return x.id!==id;});});}
function signOut(){setSess(null);S.appts=[];render();}

/* ===================== 상태 ===================== */
var S={data:null,err:false,tab:"schedule",hospitalIds:new Set(),depts:new Set(),selected:new Set(),
       appts:[],calView:"week",calCursor:new Date(),weekCursor:new Date(),selDate:"",schedView:"week"};

/* ===================== 데이터 로드 ===================== */
(function(){
  var i=0;
  function tryNext(){
    if(i>=DATA_URLS.length){S.err=true;render();return;}
    fetch(DATA_URLS[i++],{cache:"no-store"}).then(function(r){
      if(!r.ok) throw 0; return r.json();
    }).then(function(j){S.data=j;initSelections();boot();}).catch(tryNext);
  }
  tryNext();
})();
function boot(){ if(getSess()){ loadAppointments().then(render).catch(function(){render();}); } else { render(); } }

function hospitals(){return (S.data&&S.data.hospitals)||[];}
function selHospitals(){return hospitals().filter(function(h){return S.hospitalIds.has(h.id);});}
function firstHosp(){return selHospitals()[0]||hospitals()[0]||{};}
function depts(){var s=[];selHospitals().forEach(function(h){(h.professors||[]).forEach(function(p){if(s.indexOf(p.department)<0)s.push(p.department);});});return s;}
function allProfs(){var a=[];selHospitals().forEach(function(h){(h.professors||[]).forEach(function(p){if(S.depts.has(p.department))a.push({hid:h.id,hname:h.name,p:p});});});return a;}
function groups(){return selHospitals().map(function(h){return {h:h,profs:(h.professors||[]).filter(function(p){return S.depts.has(p.department)&&S.selected.has(h.id+"|"+p.name);})};}).filter(function(g){return g.profs.length;});}
function deptLabel(ds){if(S.depts.size>=ds.length)return "전체";if(S.depts.size===1)return Array.from(S.depts)[0];return S.depts.size+"개";}
function deptStyle(d){var m={"정형외과":["#e0f2fe","#0369a1"],"신경외과":["#ede9fe","#6d28d9"]};var c=m[d]||["#f1f5f9","#475569"];return "background:"+c[0]+";color:"+c[1];}
function dtagHTML(d){return '<span class="dtag" style="'+deptStyle(d)+'">'+esc(d)+'</span>';}
function timeOpts(sel,slot){var r={AM:[8,12],PM:[13,18]}[slot]||[8,20];var o='<option value="">선택 안 함</option>';for(var h=r[0];h<=r[1];h++){for(var m=0;m<60;m+=30){if(h===r[1]&&m>0)break;var v=pad(h)+":"+pad(m);o+='<option value="'+v+'"'+(v===sel?" selected":"")+'>'+v+'</option>';}}return o;}

function initSelections(){
  var hs=hospitals();
  if(!S.hospitalIds.size&&hs.length)S.hospitalIds=new Set(hs.map(function(h){return h.id;}));
  var ds=depts();
  var keep=ds.filter(function(d){return S.depts.has(d);});
  S.depts=new Set(keep.length?keep:ds);
  if(!S.selDate){var t=new Date();while(monIdx(t)>4)t=addDays(t,1);S.selDate=fmt(t);S.weekCursor=t;}
  resetSelected();
}
function resetSelected(){S.selected=new Set(allProfs().map(function(x){return x.hid+"|"+x.p.name;}));}

function apptIndex(){var m={};S.appts.forEach(function(a){m[a.date+"|"+a.slot+"|"+a.hospitalId+"|"+a.professor]=a;});return m;}

/* ===================== 렌더 ===================== */
function render(){
  if(!getSess()){renderLogin();return;}
  var root=document.getElementById("root");
  root.innerHTML=headerHTML()+'<main id="main"></main>';
  document.querySelectorAll(".tab").forEach(function(b){b.onclick=function(){S.tab=b.dataset.t;render();};});
  var lo=document.getElementById("logout"); if(lo)lo.onclick=signOut;
  var main=document.getElementById("main");
  if(S.err){main.innerHTML='<div class="empty" style="color:#e11d48;font-weight:700">데이터를 불러오지 못했습니다.</div>';return;}
  if(!S.data){main.innerHTML='<div class="empty">불러오는 중…</div>';return;}
  if(S.tab==="schedule")renderSchedule(main);else renderCalendar(main);
}

function renderLogin(){
  var root=document.getElementById("root");
  root.innerHTML='<div class="loginwrap"><div class="logincard">'+
    '<div class="loginlogo">MR 영업 스케줄러</div>'+
    '<div class="loginsub">로그인 후 이용하세요</div>'+
    '<input id="lg-email" type="email" placeholder="이메일" autocomplete="username">'+
    '<input id="lg-pw" type="password" placeholder="비밀번호 (6자 이상)" autocomplete="current-password">'+
    '<div id="lg-msg" class="loginmsg"></div>'+
    '<button class="btn brand" id="lg-in">로그인</button>'+
    '<button class="btn ghost" id="lg-up">회원가입</button>'+
    '</div></div>';
  function msg(t,err){var m=document.getElementById("lg-msg");m.textContent=t||"";m.style.color=err?"#e11d48":"#059669";}
  function creds(){return {email:(document.getElementById("lg-email").value||"").trim(),password:document.getElementById("lg-pw").value||""};}
  function ok(j){ if(j.access_token){ saveAuth(j); msg("로그인 완료!"); loadAppointments().then(render).catch(render); return true; } return false; }
  document.getElementById("lg-in").onclick=function(){var c=creds();if(!c.email||!c.password){msg("이메일과 비밀번호를 입력하세요",true);return;}msg("로그인 중…");
    authReq("token?grant_type=password",c).then(function(r){ if(!ok(r.j)) msg((r.j&&(r.j.error_description||r.j.msg))||"로그인 실패 — 이메일/비밀번호 확인",true); });};
  document.getElementById("lg-up").onclick=function(){var c=creds();if(!c.email||c.password.length<6){msg("이메일과 6자 이상 비밀번호를 입력하세요",true);return;}msg("가입 중…");
    authReq("signup",c).then(function(r){ if(r.ok){ if(!ok(r.j)) msg("가입 완료! 이메일 인증이 필요하면 메일 확인 후 로그인하세요.",false); } else msg((r.j&&(r.j.msg||r.j.error_description))||"가입 실패",true); });};
}

  var u=S.data&&S.data.updatedAt?new Date(S.data.updatedAt):null;
  var upd=u?("데이터 "+u.getFullYear()+"."+pad(u.getMonth()+1)+"."+pad(u.getDate())+" · 매주 자동 갱신"):"";

    '<div class="hrow"><div class="logo">MR 영업 스케줄러 <span class="dot">·</span> <span class="sub">교수 진료시간표 + 면담 일정</span></div>'+
    '<div class="userbox"><span class="sub">'+esc(upd)+'</span><span class="uemail">'+esc((getSess()||{}).email||"")+'</span><button class="btn ghost" id="logout" style="padding:6px 12px">로그아웃</button></div></div>'+
    '<div class="tabs">'+
      '<button class="tab '+(S.tab==="schedule"?"on":"")+'" data-t="schedule">진료 시간표</button>'+

/* ---------- 진료 시간표 ---------- */

  var ds=depts(), aps=allProfs();

  var allProf=S.selected.size===aps.length&&aps.length>0;
  main.innerHTML=
    '<div class="filters">'+
      '<div class="frow">'+
        '<div class="field" style="flex:1"><label>병원</label><button class="picker-btn" id="f-hp">'+
          '<span>'+(allHosp?"전체":(S.hospitalIds.size+"곳"))+'</span><span style="color:#94a3b8">▾</span></button>'+
          '<div class="pop" id="pop-h" style="display:none"></div></div>'+
        '<div class="field" style="flex:1"><label>진료과</label><button class="picker-btn" id="f-dp">'+
          '<span>'+deptLabel(ds)+'</span><span style="color:#94a3b8">▾</span></button>'+
          '<div class="pop" id="pop-d" style="display:none"></div></div>'+
      '</div>'+
      '<div class="field fw"><label>교수</label><button class="picker-btn" id="f-p">'+
        '<span>'+(allProf?"전체":(S.selected.size+"명 선택"))+'</span><span style="color:#94a3b8">▾</span></button>'+
        '<div class="pop" id="pop" style="display:none"></div></div>'+
    '</div>'+
    '<div class="seg schedseg"><button id="sv-week" class="'+(S.schedView==="week"?"on":"")+'">일주일</button>'+
      '<button id="sv-day" class="'+(S.schedView==="day"?"on":"")+'">하루</button></div>'+
    '<div id="schedbody"></div>'+
    '<p class="note">초록 ‘공석’은 외래가 없는 시간(영업 공략 타이밍)입니다. 누르면 그 날짜로 면담 일정이 등록됩니다. (수술/학회 등 미반영)</p>';

  document.getElementById("sv-week").onclick=function(){S.schedView="week";render();};
  document.getElementById("sv-day").onclick=function(){S.schedView="day";render();};
  setupHospPicker();
  setupDeptPicker();
  setupProfPicker();
  renderSchedBody();
}

function renderSchedBody(){
  var body=document.getElementById("schedbody");if(!body)return;
  if(S.schedView==="week"){body.innerHTML=weekRangeHTML()+'<div id="weekhost"></div>';bindWeekNav();renderWeekGrid();}
  else{body.innerHTML=weekBarHTML()+'<div id="listhost"></div>';bindWeekBar();renderProfList();}
}
function refreshSched(){if(S.schedView==="week")renderWeekGrid();else renderProfList();}

function weekRangeHTML(){
  var s=startWeek(S.weekCursor),e=addDays(s,5);
  var lab=(s.getMonth()+1)+"월 "+s.getDate()+"일 – "+(e.getMonth()+1)+"월 "+e.getDate()+"일";
  return '<div class="weekbar"><button class="navbtn" id="wprev">‹</button>'+
    '<div class="caltitle" style="flex:1">'+esc(lab)+'</div>'+
    '<button class="navbtn" id="wnext">›</button>'+
    '<button class="btn soft" id="wtoday" style="margin-left:6px;padding:6px 10px">오늘</button></div>';
}
function bindWeekNav(){
  document.getElementById("wprev").onclick=function(){S.weekCursor=addDays(S.weekCursor,-7);render();};
  document.getElementById("wnext").onclick=function(){S.weekCursor=addDays(S.weekCursor,7);render();};
  document.getElementById("wtoday").onclick=function(){S.weekCursor=new Date();render();};
}

function weekBarHTML(){
  var s=startWeek(S.weekCursor),chips="";
  for(var i=0;i<5;i++){var d=addDays(s,i),ymd=fmt(d);
    chips+='<button class="daychip'+(ymd===S.selDate?" on":"")+(ymd===todayYmd()?" today":"")+'" data-ymd="'+ymd+'">'+
      '<span class="dw">'+DAY_KO[DAYS[i]]+'</span><span class="dd">'+d.getDate()+'</span></button>';
  }
  return '<div class="weekbar"><button class="navbtn" id="wprev">‹</button>'+
    '<div class="daychips">'+chips+'</div><button class="navbtn" id="wnext">›</button></div>';
}
function bindWeekBar(){
  document.getElementById("wprev").onclick=function(){S.weekCursor=addDays(S.weekCursor,-7);S.selDate=fmt(addDays(parseYmd(S.selDate),-7));render();};
  document.getElementById("wnext").onclick=function(){S.weekCursor=addDays(S.weekCursor,7);S.selDate=fmt(addDays(parseYmd(S.selDate),7));render();};
  document.querySelectorAll(".daychip").forEach(function(b){b.onclick=function(){S.selDate=b.dataset.ymd;
    document.querySelectorAll(".daychip").forEach(function(x){x.className="daychip"+(x.dataset.ymd===S.selDate?" on":"")+(x.dataset.ymd===todayYmd()?" today":"");});
    renderProfList();};});
}

function updFilterLabels(){
  var ds=depts(),allH=S.hospitalIds.size===hospitals().length,aps=allProfs();
  var bh=document.getElementById("f-hp"); if(bh)bh.querySelector("span").textContent=allH?"전체":(S.hospitalIds.size+"곳");
  var bd=document.getElementById("f-dp"); if(bd)bd.querySelector("span").textContent=deptLabel(ds);
  var pf=document.getElementById("f-p"); if(pf)pf.querySelector("span").textContent=(S.selected.size===aps.length&&aps.length>0)?"전체":(S.selected.size+"명 선택");
}
function onHospChange(){
  var ds=depts(),keep=ds.filter(function(d){return S.depts.has(d);}); S.depts=new Set(keep.length?keep:ds);
  resetSelected(); updFilterLabels(); refreshSched();
}
function onDeptChange(){ resetSelected(); updFilterLabels(); refreshSched(); }

function setupDeptPicker(){
  var btn=document.getElementById("f-dp"),pop=document.getElementById("pop-d");
  function build(){
    var ds=depts(),all=S.depts.size>=ds.length;
    pop.innerHTML='<button class="all">'+(all?"전체 해제":"전체 선택")+'</button>'+
      ds.map(function(d){return '<label><input type="checkbox" data-d="'+esc(d)+'"'+(S.depts.has(d)?" checked":"")+'><span style="font-weight:600">'+esc(d)+'</span></label>';}).join("");
    pop.querySelector(".all").onclick=function(){if(all)S.depts=new Set();else S.depts=new Set(ds);onDeptChange();build();};
    pop.querySelectorAll("input").forEach(function(c){c.onchange=function(){var d=c.dataset.d;if(c.checked)S.depts.add(d);else S.depts.delete(d);onDeptChange();};});
  }
  btn.onclick=function(e){e.stopPropagation();pop.style.display=pop.style.display==="none"?"block":"none";if(pop.style.display==="block")build();};
  document.addEventListener("click",function(e){if(!pop.contains(e.target)&&!btn.contains(e.target))pop.style.display="none";});
}

function setupHospPicker(){
  var btn=document.getElementById("f-hp"),pop=document.getElementById("pop-h");
  function build(){
    var all=S.hospitalIds.size===hospitals().length;
    pop.innerHTML='<button class="all">'+(all?"전체 해제":"전체 선택")+'</button>'+
      hospitals().map(function(h){return '<label><input type="checkbox" data-h="'+h.id+'"'+(S.hospitalIds.has(h.id)?" checked":"")+'><span style="font-weight:600">'+esc(h.name)+'</span></label>';}).join("");
    pop.querySelector(".all").onclick=function(){if(all)S.hospitalIds=new Set();else S.hospitalIds=new Set(hospitals().map(function(h){return h.id;}));onHospChange();build();};
    pop.querySelectorAll("input").forEach(function(c){c.onchange=function(){var id=c.dataset.h;if(c.checked)S.hospitalIds.add(id);else S.hospitalIds.delete(id);onHospChange();};});
  }
  btn.onclick=function(e){e.stopPropagation();pop.style.display=pop.style.display==="none"?"block":"none";if(pop.style.display==="block")build();};
  document.addEventListener("click",function(e){if(!pop.contains(e.target)&&!btn.contains(e.target))pop.style.display="none";});
}

function setupProfPicker(){
  var btn=document.getElementById("f-p"),pop=document.getElementById("pop");
  function syncBtn(){var aps=allProfs();var all=S.selected.size===aps.length&&aps.length>0;btn.querySelector("span").textContent=all?"전체":(S.selected.size+"명 선택");}
  function build(){
    var aps=allProfs(),all=S.selected.size===aps.length&&aps.length>0,multi=S.hospitalIds.size>1;
    var html='<button class="all">'+(all?"전체 해제":"전체 선택")+'</button>';
    selHospitals().forEach(function(h){
      var ps=(h.professors||[]).filter(function(p){return S.depts.has(p.department);});
      if(!ps.length)return;
      if(multi)html+='<div class="popgrp">'+esc(h.name)+'</div>';
      var md=S.depts.size>1;
      html+=ps.map(function(p){var k=h.id+"|"+p.name;return '<label><input type="checkbox" data-k="'+esc(k)+'"'+(S.selected.has(k)?" checked":"")+'>'+
        '<span style="font-weight:600">'+esc(p.name)+'</span>'+(md?' '+dtagHTML(p.department):'')+(p.title?' <span style="color:#94a3b8;font-size:12px">'+esc(p.title)+'</span>':'')+'</label>';}).join("");
    });
    pop.innerHTML=html;
    pop.querySelector(".all").onclick=function(){if(all)S.selected=new Set();else S.selected=new Set(aps.map(function(x){return x.hid+"|"+x.p.name;}));build();syncBtn();refreshSched();};
    pop.querySelectorAll("input").forEach(function(c){c.onchange=function(){var k=c.dataset.k;if(c.checked)S.selected.add(k);else S.selected.delete(k);syncBtn();refreshSched();};});
  }
  btn.onclick=function(e){e.stopPropagation();pop.style.display=pop.style.display==="none"?"block":"none";if(pop.style.display==="block")build();};
  document.addEventListener("click",function(e){if(!pop.contains(e.target)&&!btn.contains(e.target))pop.style.display="none";});
}

function renderProfList(){
  var host=document.getElementById("listhost");if(!host)return;
  var d=parseYmd(S.selDate),dayKey=DAYS[monIdx(d)];
  var head='<div class="datehead">'+(d.getMonth()+1)+'월 '+d.getDate()+'일 <span>('+DAY_KO[dayKey]+')</span></div>';
  var gs=groups();
  if(!gs.length){host.innerHTML=head+'<div class="empty">표시할 교수가 없습니다.</div>';return;}
  var idx=apptIndex(),multi=S.hospitalIds.size>1,md=S.depts.size>1;
  var body=gs.map(function(g){
    var cards=g.profs.map(function(p){
      var cells=SLOTS.map(function(sl){
        var busy=((p.schedule||{})[dayKey]||[]).indexOf(sl[0])>=0;
        if(busy)return '<div class="slot busy"><span class="lab">'+sl[1]+'</span>진료</div>';
        var bk=idx[S.selDate+"|"+sl[0]+"|"+g.h.id+"|"+p.name];
        var mk=bk?'<span class="mk" style="background:'+statusColor(bk.status)+'"></span>':"";
        return '<button class="slot free" data-s="'+sl[0]+'" data-h="'+g.h.id+'" data-p="'+esc(p.name)+'"><span class="lab">'+sl[1]+'</span>'+(bk?(mk+"면담"):"공석")+'</button>';
      }).join("");
      return '<div class="pcard"><div class="pinfo"><div class="nm">'+esc(p.name)+(p.title?' <span class="tt">'+esc(p.title)+'</span>':'')+(md?' '+dtagHTML(p.department):'')+'</div>'+
        (p.specialty?'<div class="sp">'+esc(p.specialty)+'</div>':'')+'</div><div class="slots">'+cells+'</div></div>';
    }).join("");
    return (multi?'<div class="grphdr">'+esc(g.h.name)+'</div>':'')+'<div class="plist">'+cards+'</div>';
  }).join("");
  host.innerHTML=head+body;
  host.querySelectorAll(".slot.free").forEach(function(b){b.onclick=function(){
    var h=hospitals().filter(function(x){return x.id===b.dataset.h;})[0];
    var p=(h.professors||[]).filter(function(x){return x.name===b.dataset.p;})[0];
    var bk=apptIndex()[S.selDate+"|"+b.dataset.s+"|"+h.id+"|"+p.name];
    if(bk)openModal(bk);else openModal({hospitalId:h.id,hospitalName:h.name,dept:p.department,professor:p.name,slot:b.dataset.s,date:S.selDate});
  };});
}
function renderWeekGrid(){
  var host=document.getElementById("weekhost");if(!host)return;
  var gs=groups();
  if(!gs.length){host.innerHTML='<div class="empty">표시할 교수가 없습니다.</div>';return;}
  var s=startWeek(S.weekCursor),idx=apptIndex(),dates=[],multi=S.hospitalIds.size>1,md=S.depts.size>1;
  for(var i=0;i<5;i++)dates.push(addDays(s,i));
  var head='<div class="wkc lbl"></div>'+dates.map(function(d){var t=fmt(d)===todayYmd();
    return '<div class="wkc wd'+(t?" td":"")+'">'+DAY_KO[DAYS[monIdx(d)]]+'<b>'+d.getDate()+'</b></div>';}).join("");
  var html='<div class="wkhead">'+head+'</div>';
  gs.forEach(function(g){
    if(multi)html+='<div class="grphdr">'+esc(g.h.name)+'</div>';
    g.profs.forEach(function(p){
      html+='<div class="wkcard"><div class="wkname">'+esc(p.name)+(p.title?' <span>'+esc(p.title)+'</span>':'')+(md?' '+dtagHTML(p.department):'')+
        (p.specialty?'<span class="sp">'+esc(p.specialty)+'</span>':'')+'</div>';
      SLOTS.forEach(function(sl){
        html+='<div class="wkrow"><div class="wkc rl">'+sl[1]+'</div>';
        dates.forEach(function(d){var dayKey=DAYS[monIdx(d)],ymd=fmt(d);
          var busy=((p.schedule||{})[dayKey]||[]).indexOf(sl[0])>=0;
          if(busy){html+='<div class="wkc cell busy">진료</div>';}
          else{var bk=idx[ymd+"|"+sl[0]+"|"+g.h.id+"|"+p.name];
            var mk=bk?'<span class="mk" style="background:'+statusColor(bk.status)+'"></span>':"";
            html+='<button class="wkc cell free" data-ymd="'+ymd+'" data-s="'+sl[0]+'" data-h="'+g.h.id+'" data-p="'+esc(p.name)+'">'+(bk?mk+'면담':'공석')+'</button>';}
        });
        html+='</div>';
      });
      html+='</div>';
    });
  });
  host.innerHTML=html;
  host.querySelectorAll(".wkc.cell.free").forEach(function(b){b.onclick=function(){
    var h=hospitals().filter(function(x){return x.id===b.dataset.h;})[0];
    var p=(h.professors||[]).filter(function(x){return x.name===b.dataset.p;})[0];
    var bk=apptIndex()[b.dataset.ymd+"|"+b.dataset.s+"|"+h.id+"|"+p.name];
    if(bk)openModal(bk);else openModal({hospitalId:h.id,hospitalName:h.name,dept:p.department,professor:p.name,slot:b.dataset.s,date:b.dataset.ymd});
  };});
}
function statusColor(s){return s==="done"?"#059669":s==="canceled"?"#94a3b8":"#2563eb";}

/* ---------- 내 캘린더 ---------- */
function renderCalendar(main){
  var title;
  if(S.calView==="week"){var s=startWeek(S.calCursor),e=addDays(s,6);title=(s.getMonth()+1)+"/"+s.getDate()+" – "+(e.getMonth()+1)+"/"+e.getDate();}
  else title=S.calCursor.getFullYear()+"년 "+(S.calCursor.getMonth()+1)+"월";
  main.innerHTML=
    '<div class="calbar">'+
      '<div style="display:flex;align-items:center;gap:4px">'+
        '<button class="navbtn" id="prev">‹</button><div class="caltitle">'+esc(title)+'</div><button class="navbtn" id="next">›</button>'+
        '<button class="btn soft" id="today" style="margin-left:6px;padding:6px 10px">오늘</button></div>'+
      '<div style="display:flex;gap:8px;align-items:center">'+
        '<div class="seg"><button id="vw-week" class="'+(S.calView==="week"?"on":"")+'">주</button><button id="vw-month" class="'+(S.calView==="month"?"on":"")+'">월</button></div>'+
        '<button class="btn brand" id="newappt">+ 일정</button></div>'+
    '</div><div id="calhost"></div>';
  document.getElementById("prev").onclick=function(){move(-1);};
  document.getElementById("next").onclick=function(){move(1);};
  document.getElementById("today").onclick=function(){S.calCursor=new Date();render();};
  document.getElementById("vw-week").onclick=function(){S.calView="week";render();};
  document.getElementById("vw-month").onclick=function(){S.calView="month";render();};
  document.getElementById("newappt").onclick=function(){var h=firstHosp();openModal({hospitalId:h.id||"",hospitalName:h.name||"",dept:Array.from(S.depts)[0]||"",professor:"",date:todayYmd(),slot:"AM"});};
  if(S.calView==="week")renderWeek();else renderMonth();
}
function move(n){if(S.calView==="week")S.calCursor=addDays(S.calCursor,n*7);else S.calCursor=new Date(S.calCursor.getFullYear(),S.calCursor.getMonth()+n,1);render();}
function tk(a){return a.time?a.time:(a.slot==="AM"?"08:00":"13:00");}
function byDate(){var m={};S.appts.forEach(function(a){(m[a.date]=m[a.date]||[]).push(a);});Object.keys(m).forEach(function(k){m[k].sort(function(a,b){var x=tk(a),y=tk(b);return x<y?-1:x>y?1:0;});});return m;}
function badge(st){var b=STATUS[st]||STATUS.planned;return '<span class="badge '+b[1]+'"><span class="d"></span>'+b[0]+'</span>';}

function renderWeek(){
  var host=document.getElementById("calhost"),s=startWeek(S.calCursor),m=byDate(),html='<div class="week">';
  for(var i=0;i<7;i++){
    var d=addDays(s,i),ymd=fmt(d),list=m[ymd]||[],today=ymd===todayYmd();
    html+='<div class="day'+(today?" today":"")+'"><h4>'+(DAY_KO[DAYS[monIdx(d)]]||"일")+" "+d.getDate()+'</h4>';
    list.forEach(function(a){html+='<button class="appt" data-id="'+a.id+'"><div class="t">'+esc(a.title)+'</div>'+
      '<div class="m"><span class="slotlab">'+(a.time?a.time:(a.slot==="AM"?"오전":"오후"))+'</span>'+badge(a.status)+'</div></button>';});
    html+='</div>';
  }
  html+='</div>';host.innerHTML=html;
  host.querySelectorAll(".appt").forEach(function(b){b.onclick=function(){openModal(findAppt(b.dataset.id));};});
}
function renderMonth(){
  var host=document.getElementById("calhost"),first=new Date(S.calCursor.getFullYear(),S.calCursor.getMonth(),1);
  var gs=startWeek(first),m=byDate();
  var html='<div class="month"><div class="mhead">'+["월","화","수","목","금","토","일"].map(function(x){return "<div>"+x+"</div>";}).join("")+'</div><div class="mgrid">';
  for(var i=0;i<42;i++){
    var d=addDays(gs,i),ymd=fmt(d),list=m[ymd]||[],inM=d.getMonth()===S.calCursor.getMonth(),today=ymd===todayYmd();
    html+='<div class="mcell'+(inM?"":" out")+(today?" today":"")+'"><div class="dn">'+d.getDate()+'</div>';
    list.slice(0,3).forEach(function(a){html+='<button class="mline" data-id="'+a.id+'"><span class="d" style="background:'+statusColor(a.status)+'"></span><span>'+(a.time?esc(a.time)+" ":"")+esc(a.title)+'</span></button>';});
    if(list.length>3)html+='<div style="font-size:10px;color:#94a3b8">+'+(list.length-3)+'</div>';
    html+='</div>';
  }
  html+='</div></div>';host.innerHTML=html;
  host.querySelectorAll(".mline").forEach(function(b){b.onclick=function(){openModal(findAppt(b.dataset.id));};});
}
function findAppt(id){return S.appts.filter(function(a){return a.id===id;})[0];}

/* ---------- 모달 ---------- */
function profSchedule(hid,name){var h=hospitals().filter(function(x){return x.id===hid;})[0];if(!h)return null;var p=(h.professors||[]).filter(function(x){return x.name===name;})[0];return p?(p.schedule||{}):null;}
function isBusy(hid,name,ymd,slot){if(!name||!ymd)return false;var s=profSchedule(hid,name);if(!s)return false;return (s[DAYS[monIdx(parseYmd(ymd))]]||[]).indexOf(slot)>=0;}

function openModal(init){
  var f=Object.assign({id:null,hospitalId:"",hospitalName:"",dept:"",professor:"",date:todayYmd(),slot:"AM",time:"",title:"",status:"planned",memo:""},init);
  if(!f.title)f.title=f.professor?(f.professor+" 교수 면담"):"영업 면담";
  var statusVal=f.status;
  var ctx=[f.hospitalName,f.dept,f.professor?(f.professor+" 교수"):""].filter(Boolean).join(" · ");
  function slotOpts(date,sel){return [["AM","오전"],["PM","오후"]].map(function(sl){var busy=isBusy(f.hospitalId,f.professor,date,sl[0]);return '<option value="'+sl[0]+'"'+(sl[0]===sel?" selected":"")+(busy?" disabled":"")+'>'+sl[1]+(busy?" (진료중)":"")+'</option>';}).join("");}
  var mr=document.getElementById("modal-root");
  mr.innerHTML='<div class="overlay" id="ov"><div class="modal">'+
    '<button class="mclose" id="mx">×</button><h3>'+(f.id?"면담 일정 수정":"면담 일정 등록")+'</h3>'+
    '<div class="mctx">'+esc(ctx)+'</div>'+
    '<label class="fl"><span>제목</span><input id="m-title" value="'+esc(f.title)+'"></label>'+
    '<label class="fl"><span>날짜</span><input id="m-date" type="date" value="'+esc(f.date)+'"></label>'+
    '<div class="two"><label class="fl"><span>시간대</span><select id="m-slot">'+slotOpts(f.date,f.slot)+'</select></label>'+
      '<label class="fl"><span>시간 (선택·30분)</span><select id="m-time">'+timeOpts(f.time||"",f.slot)+'</select></label></div>'+
    '<div class="fl"><span>상태</span><div class="statusrow" id="m-status">'+
      Object.keys(STATUS).map(function(k){return '<button data-k="'+k+'" class="'+STATUS[k][2]+(k===statusVal?" on":"")+'">'+STATUS[k][0]+'</button>';}).join("")+'</div></div>'+
    '<label class="fl"><span>메모</span><textarea id="m-memo" rows="2" placeholder="면담 목적, 연락처 등">'+esc(f.memo)+'</textarea></label>'+
    '<div class="mfoot">'+(f.id?'<button class="btn ghost" id="m-del" style="color:#e11d48">삭제</button>':'')+
      '<div style="flex:1"></div><button class="btn soft" id="m-cancel">취소</button><button class="btn brand" id="m-save">저장</button></div>'+
    '</div></div>';
  function close(){mr.innerHTML="";}
  document.getElementById("ov").onclick=function(e){if(e.target.id==="ov")close();};
  document.getElementById("mx").onclick=close;
  document.getElementById("m-cancel").onclick=close;
  document.getElementById("m-date").onchange=function(){
    var ss=document.getElementById("m-slot");ss.innerHTML=slotOpts(this.value,ss.value);
    if(ss.options[ss.selectedIndex]&&ss.options[ss.selectedIndex].disabled){for(var i=0;i<ss.options.length;i++){if(!ss.options[i].disabled){ss.selectedIndex=i;break;}}}
    var t=document.getElementById("m-time");t.innerHTML=timeOpts(t.value,ss.value);
  };
  document.getElementById("m-slot").onchange=function(){var t=document.getElementById("m-time");t.innerHTML=timeOpts(t.value,this.value);};
  document.getElementById("m-status").querySelectorAll("button").forEach(function(b){b.onclick=function(){
    statusVal=b.dataset.k;
    document.getElementById("m-status").querySelectorAll("button").forEach(function(x){x.className=STATUS[x.dataset.k][2]+(x.dataset.k===statusVal?" on":"");});
  };});
  if(f.id)document.getElementById("m-del").onclick=function(){var b=this;b.disabled=true;apptDelete(f.id).then(function(){close();render();}).catch(function(e){b.disabled=false;alert("삭제 실패: "+e.message);});};
  document.getElementById("m-save").onclick=function(){
    var obj={id:f.id||null,hospitalId:f.hospitalId,hospitalName:f.hospitalName,dept:f.dept,professor:f.professor,
      date:document.getElementById("m-date").value,slot:document.getElementById("m-slot").value,time:document.getElementById("m-time").value,
      title:document.getElementById("m-title").value.trim()||"영업 면담",status:statusVal,memo:document.getElementById("m-memo").value.trim()};
    if(isBusy(obj.hospitalId,obj.professor,obj.date,obj.slot)){alert("그 시간대는 교수님 진료가 있어 면담을 등록할 수 없어요. 다른 시간대를 선택해 주세요.");return;}
    var b=this;b.disabled=true;
    var p=obj.id?apptUpdate(obj):apptCreate(obj);
    p.then(function(){close();render();}).catch(function(e){b.disabled=false;alert("저장 실패: "+e.message);});
  };
}
</script>
</body>
</html>
