<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MR 영업 스케줄러 | 교수 진료시간표 · 면담 일정</title>
<meta name="description" content="대학병원 정형외과·신경외과 교수 진료시간표를 비교하고, 공석 시간에 영업 면담 일정을 등록·관리하는 MR용 웹앱." />
<style>
  :root{
    --brand:#E0112E; --ink:#1d1d1f; --sub:#6b7280; --line:#e5e7eb; --bg:#f6f7f9; --card:#fff;
    --busy-bg:#fff1f2; --busy:#e11d48; --free-bg:#ecfdf5; --free:#059669; --free-ring:#a7f3d0;
    --blue:#2563eb; --blue-bg:#eff6ff; --green:#059669; --green-bg:#ecfdf5; --gray:#94a3b8; --gray-bg:#f1f5f9;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    -webkit-font-smoothing:antialiased;line-height:1.5}
  button{font-family:inherit;cursor:pointer}
  ::-webkit-scrollbar{height:9px;width:9px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:8px}

  header.top{background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
  .wrap{max-width:1080px;margin:0 auto;padding:0 16px}
  .hrow{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:12px 0}
  .logo{font-size:18px;font-weight:800;letter-spacing:-.3px}
  .logo .dot{color:var(--brand)}
  .sub{font-size:12px;color:var(--sub)}
  .tabs{display:flex;gap:4px}
  .tab{border:none;background:none;padding:10px 16px;font-size:14px;font-weight:700;color:var(--sub);
       border-bottom:2px solid transparent;margin-bottom:-1px}
  .tab.on{color:var(--ink);border-bottom-color:var(--brand)}
  main{max-width:1080px;margin:0 auto;padding:18px 16px}

  .filters{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;margin-bottom:14px}
  .field{display:flex;flex-direction:column;gap:5px;position:relative}
  .field>label{font-size:11px;font-weight:800;color:var(--sub)}
  select,input,textarea{font-family:inherit;font-size:14px;border:1px solid var(--line);border-radius:11px;
    padding:9px 11px;background:#fff;color:var(--ink)}
  select:focus,input:focus,textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(224,17,46,.12)}
  .btn{border:none;border-radius:11px;padding:9px 16px;font-size:13px;font-weight:700}
  .btn.brand{background:var(--brand);color:#fff}
  .btn.ghost{background:#fff;border:1px solid var(--line);color:var(--ink)}
  .btn.soft{background:#f1f5f9;color:#475569}

  /* 교수 선택 팝오버 */
  .picker-btn{min-width:150px;display:flex;justify-content:space-between;align-items:center;gap:8px;
    border:1px solid var(--line);border-radius:11px;background:#fff;padding:9px 11px;font-size:14px;font-weight:600}
  .pop{position:absolute;top:100%;left:0;margin-top:6px;width:230px;max-height:300px;overflow:auto;background:#fff;
    border:1px solid var(--line);border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.12);padding:6px;z-index:30}
  .pop label{display:flex;align-items:center;gap:8px;padding:8px;border-radius:8px;font-size:14px}
  .pop label:hover{background:#f8fafc}
  .pop .all{color:var(--brand);font-weight:800;font-size:12px;padding:6px 8px;background:none;border:none;text-align:left;width:100%}

  .legend{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--sub);margin:6px 2px 12px}
  .legend i{display:inline-block;width:13px;height:13px;border-radius:4px;vertical-align:-2px;margin-right:5px}
  .lg-busy{background:var(--busy-bg);outline:1px solid #fecdd3}
  .lg-free{background:var(--free-bg);outline:1px solid var(--free-ring)}

  .gridwrap{overflow-x:auto;border:1px solid var(--line);border-radius:16px;background:#fff}
  table.grid{border-collapse:collapse;width:100%;min-width:600px;font-size:14px}
  table.grid th,table.grid td{padding:7px 8px;text-align:center}
  table.grid thead th{background:#fafbfc;border-bottom:1px solid var(--line);vertical-align:bottom;min-width:118px}
  .pname{font-weight:800}
  .ptitle{font-size:11px;color:var(--sub);font-weight:600}
  .rowhead{position:sticky;left:0;background:#fff;border-right:1px solid var(--line);
    font-size:12px;font-weight:800;color:var(--sub);white-space:nowrap;text-align:left;min-width:74px;z-index:1}
  thead .corner{position:sticky;left:0;background:#fafbfc;z-index:2;border-right:1px solid var(--line)}
  .sep td,.sep th{border-top:2px solid #e2e8f0}
  .cell{border-top:1px solid #f1f5f9}
  .chip{display:block;width:100%;border-radius:9px;font-size:11px;font-weight:800;padding:7px 4px;border:none}
  .chip.busy{background:var(--busy-bg);color:var(--busy)}
  .chip.free{background:var(--free-bg);color:var(--free);box-shadow:inset 0 0 0 1px var(--free-ring)}
  .chip.free:hover{background:#d1fae5}
  .chip .mk{display:inline-block;width:6px;height:6px;border-radius:50%;vertical-align:1px;margin-right:3px}

  .note{font-size:12px;color:var(--sub);line-height:1.6;margin-top:12px}

  /* 캘린더 */
  .calbar{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px}
  .navbtn{width:32px;height:32px;border-radius:9px;border:none;background:none;color:#64748b;font-size:18px}
  .navbtn:hover{background:#f1f5f9}
  .caltitle{font-weight:800;min-width:120px;text-align:center}
  .seg{background:#f1f5f9;border-radius:11px;padding:3px;display:flex}
  .seg button{border:none;background:none;padding:6px 14px;font-size:12px;font-weight:800;color:#64748b;border-radius:8px}
  .seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.1)}

  .week{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
  .day{border:1px solid var(--line);background:#fff;border-radius:14px;padding:8px;min-height:120px}
  .day.today{border-color:var(--brand);box-shadow:0 0 0 1px rgba(224,17,46,.25)}
  .day h4{margin:0 0 8px;font-size:12px;font-weight:800;color:var(--sub)}
  .day.today h4{color:var(--brand)}
  .appt{width:100%;text-align:left;border:1px solid #eef2f7;background:#f8fafc;border-radius:9px;padding:7px;margin-bottom:6px}
  .appt .t{font-size:11px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .appt .m{display:flex;justify-content:space-between;align-items:center;margin-top:4px}
  .slotlab{font-size:10px;color:#94a3b8}

  .badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:800;padding:2px 7px;border-radius:999px}
  .badge .d{width:6px;height:6px;border-radius:50%}
  .b-planned{background:var(--blue-bg);color:var(--blue)} .b-planned .d{background:var(--blue)}
  .b-done{background:var(--green-bg);color:var(--green)} .b-done .d{background:var(--green)}
  .b-canceled{background:var(--gray-bg);color:var(--gray);text-decoration:line-through} .b-canceled .d{background:var(--gray)}

  .month{border:1px solid var(--line);border-radius:16px;overflow:hidden;background:#fff}
  .mhead{display:grid;grid-template-columns:repeat(7,1fr);background:#fafbfc;font-size:11px;font-weight:800;color:#94a3b8;text-align:center}
  .mhead div{padding:8px 0}
  .mgrid{display:grid;grid-template-columns:repeat(7,1fr)}
  .mcell{min-height:84px;border-top:1px solid #f1f5f9;border-right:1px solid #f1f5f9;padding:5px}
  .mcell .dn{font-size:11px;font-weight:700;color:#475569;margin-bottom:3px}
  .mcell.out{background:#fafbfc}.mcell.out .dn{color:#cbd5e1}
  .mcell.today .dn{color:var(--brand)}
  .mline{display:flex;align-items:center;gap:4px;width:100%;border:none;background:none;padding:1px 0;text-align:left}
  .mline .d{width:6px;height:6px;border-radius:50%;flex:none}
  .mline span{font-size:10px;color:#475569;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* 모달 */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;display:flex;align-items:flex-end;justify-content:center;padding:0}
  .modal{background:#fff;width:100%;max-width:440px;border-radius:22px 22px 0 0;padding:18px;box-shadow:0 -10px 40px rgba(0,0,0,.2)}
  .modal h3{margin:0 0 4px;font-size:17px}
  .mclose{float:right;border:none;background:none;font-size:22px;color:#94a3b8;line-height:1}
  .mctx{font-size:12px;color:var(--sub);margin:2px 0 12px}
  .fl{display:block;margin-bottom:10px}
  .fl>span{font-size:11px;font-weight:800;color:var(--sub)}
  .fl input,.fl select,.fl textarea{width:100%;margin-top:4px}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .statusrow{display:flex;gap:8px;margin-top:4px}
  .statusrow button{flex:1;border-radius:11px;padding:9px 0;font-size:12px;font-weight:800;border:1px solid var(--line);background:#fff;color:#64748b}
  .statusrow button.on.s-planned{background:var(--blue-bg);color:var(--blue);border-color:var(--blue)}
  .statusrow button.on.s-done{background:var(--green-bg);color:var(--green);border-color:var(--green)}
  .statusrow button.on.s-canceled{background:var(--gray-bg);color:var(--gray);border-color:var(--gray)}
  .mfoot{display:flex;gap:8px;align-items:center;margin-top:16px}
  .empty{color:#9aa1ab;text-align:center;padding:36px}
  @media(min-width:560px){ .overlay{align-items:center;padding:16px} .modal{border-radius:22px} }
  /* 주간 날짜바 + 교수 리스트 (모바일 우선) */
  .weekbar{display:flex;align-items:center;gap:6px;margin-bottom:14px}
  .daychips{display:flex;gap:6px;overflow-x:auto;flex:1;padding:2px}
  .daychip{flex:0 0 auto;min-width:48px;border:1px solid var(--line);background:#fff;border-radius:13px;padding:7px 0;color:#64748b}
  .daychip .dw{display:block;font-size:11px;font-weight:700}
  .daychip .dd{display:block;font-size:17px;font-weight:800;margin-top:1px}
  .daychip.today{border-color:#fca5a5}
  .daychip.on{background:var(--brand);border-color:var(--brand);color:#fff}
  .datehead{font-size:16px;font-weight:800;margin:2px 2px 12px}
  .datehead span{color:var(--sub);font-weight:700}
  .plist{display:flex;flex-direction:column;gap:9px}
  .pcard{display:flex;align-items:center;gap:10px;border:1px solid var(--line);background:#fff;border-radius:16px;padding:12px 13px}
  .pinfo{flex:1;min-width:0}
  .nm{font-weight:800}
  .nm .tt{font-size:12px;color:var(--sub);font-weight:600;margin-left:5px}
  .sp{font-size:12px;color:var(--sub);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .slots{display:flex;gap:6px;flex:none}
  .slot{width:66px;border:none;border-radius:13px;padding:9px 4px;font-size:13px;font-weight:800;text-align:center;line-height:1.2}
  .slot .lab{display:block;font-size:10px;font-weight:700;color:#94a3b8;margin-bottom:3px}
  .slot .mk{display:inline-block;width:6px;height:6px;border-radius:50%;vertical-align:1px;margin-right:3px}
  .slot.busy{background:var(--busy-bg);color:var(--busy)} .slot.busy .lab{color:#fda4af}
  .slot.free{background:var(--free-bg);color:var(--free);box-shadow:inset 0 0 0 1px var(--free-ring)} .slot.free .lab{color:#34d399}
  .slot.free:active{background:#bbf7d0}
  @media(max-width:760px){ .week{grid-template-columns:1fr 1fr} .field{min-width:0;flex:1} .field select{width:100%} .picker-btn{min-width:0;width:100%}
    .slot{width:58px} .nm{font-size:15px} }
</style>
</head>
<body>
<div id="root"></div>
<div id="modal-root"></div>

<script>
/* ===================== 상수/유틸 ===================== */
var DATA_URLS=["./data/schedules.json","https://raw.githubusercontent.com/soyeonlee528/woorien/main/data/schedules.json"];
var DAYS=["mon","tue","wed","thu","fri","sat"], DAY_KO={mon:"월",tue:"화",wed:"수",thu:"목",fri:"금",sat:"토",sun:"일"};
var SLOTS=[["AM","오전"],["PM","오후"]];
var LS="mr_sales_appointments_v1";
var STATUS={planned:["방문 예정","b-planned","s-planned"],done:["면담 완료","b-done","s-done"],canceled:["취소","b-canceled","s-canceled"]};

function pad(n){return (n<10?"0":"")+n;}
function fmt(d){return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
function parseYmd(s){var p=String(s).split("-");return new Date(+p[0],+p[1]-1,+p[2]);}
function addDays(d,n){var x=new Date(d);x.setDate(x.getDate()+n);return x;}
function monIdx(d){return (d.getDay()+6)%7;}
function startWeek(d){return addDays(d,-monIdx(d));}
function todayYmd(){return fmt(new Date());}
function nextOcc(dayKey){var t=DAYS.indexOf(dayKey);var n=new Date();n.setHours(0,0,0,0);var diff=(t-monIdx(n)+7)%7;return fmt(addDays(n,diff));}
function esc(s){return (s==null?"":String(s)).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function loadAppts(){try{return JSON.parse(localStorage.getItem(LS))||[];}catch(e){return [];}}
function saveAppts(){localStorage.setItem(LS,JSON.stringify(S.appts));}

/* ===================== 상태 ===================== */
var S={data:null,err:false,tab:"schedule",hospitalId:"",dept:"",selected:new Set(),
       appts:loadAppts(),calView:"week",calCursor:new Date(),weekCursor:new Date(),selDate:""};

/* ===================== 데이터 로드 ===================== */
(function(){
  var i=0;
  function tryNext(){
    if(i>=DATA_URLS.length){S.err=true;render();return;}
    fetch(DATA_URLS[i++],{cache:"no-store"}).then(function(r){
      if(!r.ok) throw 0; return r.json();
    }).then(function(j){S.data=j;initSelections();render();}).catch(tryNext);
  }
  tryNext();
})();

function hospitals(){return (S.data&&S.data.hospitals)||[];}
function curHospital(){var hs=hospitals();return hs.filter(function(h){return h.id===S.hospitalId;})[0]||hs[0];}
function depts(){var h=curHospital();if(!h)return [];var s=[];(h.professors||[]).forEach(function(p){if(s.indexOf(p.department)<0)s.push(p.department);});return s;}
function profsInDept(){var h=curHospital();if(!h)return [];return (h.professors||[]).filter(function(p){return p.department===S.dept;});}

function initSelections(){
  var hs=hospitals();
  if(hs.length&&!S.hospitalId)S.hospitalId=hs[0].id;
  var ds=depts();
  if(ds.length&&ds.indexOf(S.dept)<0)S.dept=ds[0];
  if(!S.selDate){var t=new Date();if(monIdx(t)>5)t=addDays(t,1);S.selDate=fmt(t);S.weekCursor=t;}
  resetSelected();
}
function resetSelected(){S.selected=new Set(profsInDept().map(function(p){return p.name;}));}

function apptIndex(){var m={};S.appts.forEach(function(a){m[a.date+"|"+a.slot+"|"+a.hospitalId+"|"+a.professor]=a;});return m;}

/* ===================== 렌더 ===================== */
function render(){
  var root=document.getElementById("root");
  root.innerHTML=headerHTML()+'<main id="main"></main>';
  document.querySelectorAll(".tab").forEach(function(b){b.onclick=function(){S.tab=b.dataset.t;render();};});
  var main=document.getElementById("main");
  if(S.err){main.innerHTML='<div class="empty" style="color:#e11d48;font-weight:700">데이터를 불러오지 못했습니다.</div>';return;}
  if(!S.data){main.innerHTML='<div class="empty">불러오는 중…</div>';return;}
  if(S.tab==="schedule")renderSchedule(main);else renderCalendar(main);
}

function headerHTML(){
  var u=S.data&&S.data.updatedAt?new Date(S.data.updatedAt):null;
  var upd=u?("데이터 "+u.getFullYear()+"."+pad(u.getMonth()+1)+"."+pad(u.getDate())+" · 매주 자동 갱신"):"";
  return '<header class="top"><div class="wrap">'+
    '<div class="hrow"><div class="logo">MR 영업 스케줄러 <span class="dot">·</span> <span class="sub">교수 진료시간표 + 면담 일정</span></div>'+
    '<div class="sub">'+esc(upd)+'</div></div>'+
    '<div class="tabs">'+
      '<button class="tab '+(S.tab==="schedule"?"on":"")+'" data-t="schedule">진료 시간표</button>'+
      '<button class="tab '+(S.tab==="calendar"?"on":"")+'" data-t="calendar">내 캘린더</button>'+
    '</div></div></header>';
}

/* ---------- 진료 시간표 ---------- */
function renderSchedule(main){
  var hs=hospitals(), ds=depts(), profs=profsInDept();
  var hOpts=hs.map(function(h){return '<option value="'+h.id+'"'+(h.id===(curHospital()||{}).id?" selected":"")+'>'+esc(h.name)+'</option>';}).join("");
  var dOpts=ds.map(function(d){return '<option value="'+esc(d)+'"'+(d===S.dept?" selected":"")+'>'+esc(d)+'</option>';}).join("");
  var allOn=S.selected.size===profs.length&&profs.length>0;
  main.innerHTML=
    '<div class="filters">'+
      '<div class="field"><label>병원</label><select id="f-h">'+hOpts+'</select></div>'+
      '<div class="field"><label>진료과</label><select id="f-d">'+dOpts+'</select></div>'+
      '<div class="field"><label>교수</label><button class="picker-btn" id="f-p">'+
        '<span>'+(allOn?"전체":(S.selected.size+"명 선택"))+'</span><span style="color:#94a3b8">▾</span></button>'+
        '<div class="pop" id="pop" style="display:none"></div>'+
      '</div>'+
    '</div>'+
    weekBarHTML()+
    '<div id="listhost"></div>'+
    '<p class="note">초록색 ‘공석’은 해당 날짜·시간대에 외래가 없는 시간(영업 공략 타이밍)입니다. 누르면 그 날짜로 면담 일정이 등록됩니다. (수술/학회 등 미반영)</p>';

  document.getElementById("f-h").onchange=function(){S.hospitalId=this.value;S.dept=depts()[0]||"";resetSelected();render();};
  document.getElementById("f-d").onchange=function(){S.dept=this.value;resetSelected();render();};
  setupPicker(profs);
  bindWeekBar();
  renderProfList();
}

function weekBarHTML(){
  var s=startWeek(S.weekCursor),chips="";
  for(var i=0;i<6;i++){var d=addDays(s,i),ymd=fmt(d);
    chips+='<button class="daychip'+(ymd===S.selDate?" on":"")+(ymd===todayYmd()?" today":"")+'" data-ymd="'+ymd+'">'+
      '<span class="dw">'+DAY_KO[DAYS[i]]+'</span><span class="dd">'+d.getDate()+'</span></button>';
  }
  return '<div class="weekbar"><button class="navbtn" id="wprev">‹</button>'+
    '<div class="daychips">'+chips+'</div><button class="navbtn" id="wnext">›</button></div>';
}
function bindWeekBar(){
  document.getElementById("wprev").onclick=function(){S.weekCursor=addDays(S.weekCursor,-7);S.selDate=fmt(addDays(parseYmd(S.selDate),-7));render();};
  document.getElementById("wnext").onclick=function(){S.weekCursor=addDays(S.weekCursor,7);S.selDate=fmt(addDays(parseYmd(S.selDate),7));render();};
  document.querySelectorAll(".daychip").forEach(function(b){b.onclick=function(){S.selDate=b.dataset.ymd;
    document.querySelectorAll(".daychip").forEach(function(x){x.className="daychip"+(x.dataset.ymd===S.selDate?" on":"")+(x.dataset.ymd===todayYmd()?" today":"");});
    renderProfList();};});
}

function setupPicker(profs){
  var btn=document.getElementById("f-p"), pop=document.getElementById("pop");
  function build(){
    var allOn=S.selected.size===profs.length&&profs.length>0;
    pop.innerHTML='<button class="all">'+(allOn?"전체 해제":"전체 선택")+'</button>'+
      profs.map(function(p){return '<label><input type="checkbox" data-n="'+esc(p.name)+'"'+(S.selected.has(p.name)?" checked":"")+'>'+
        '<span style="font-weight:600">'+esc(p.name)+'</span>'+(p.title?' <span style="color:#94a3b8;font-size:12px">'+esc(p.title)+'</span>':'')+'</label>';}).join("");
    pop.querySelector(".all").onclick=function(){if(allOn)S.selected=new Set();else S.selected=new Set(profs.map(function(p){return p.name;}));build();renderProfList();syncBtn();};
    pop.querySelectorAll("input").forEach(function(c){c.onchange=function(){var n=c.dataset.n;if(c.checked)S.selected.add(n);else S.selected.delete(n);renderProfList();syncBtn();};});
  }
  function syncBtn(){var allOn=S.selected.size===profs.length&&profs.length>0;btn.querySelector("span").textContent=allOn?"전체":(S.selected.size+"명 선택");}
  btn.onclick=function(e){e.stopPropagation();pop.style.display=pop.style.display==="none"?"block":"none";if(pop.style.display==="block")build();};
  document.addEventListener("click",function h(e){if(!pop.contains(e.target)&&e.target!==btn){pop.style.display="none";}});
}

function renderProfList(){
  var host=document.getElementById("listhost");if(!host)return;
  var profs=profsInDept().filter(function(p){return S.selected.has(p.name);});
  var d=parseYmd(S.selDate),dayKey=DAYS[monIdx(d)];
  var head='<div class="datehead">'+(d.getMonth()+1)+'월 '+d.getDate()+'일 <span>('+DAY_KO[dayKey]+')</span></div>';
  if(!profs.length){host.innerHTML=head+'<div class="empty">표시할 교수가 없습니다.</div>';return;}
  var idx=apptIndex(),h=curHospital();
  var rows=profs.map(function(p){
    var cells=SLOTS.map(function(sl){
      var busy=((p.schedule||{})[dayKey]||[]).indexOf(sl[0])>=0;
      if(busy)return '<div class="slot busy"><span class="lab">'+sl[1]+'</span>진료</div>';
      var key=S.selDate+"|"+sl[0]+"|"+h.id+"|"+p.name,bk=idx[key];
      var mk=bk?'<span class="mk" style="background:'+statusColor(bk.status)+'"></span>':"";
      return '<button class="slot free" data-s="'+sl[0]+'" data-p="'+esc(p.name)+'"><span class="lab">'+sl[1]+'</span>'+(bk?(mk+"면담"):"공석")+'</button>';
    }).join("");
    return '<div class="pcard"><div class="pinfo"><div class="nm">'+esc(p.name)+(p.title?' <span class="tt">'+esc(p.title)+'</span>':'')+'</div>'+
      (p.specialty?'<div class="sp">'+esc(p.specialty)+'</div>':'')+'</div><div class="slots">'+cells+'</div></div>';
  }).join("");
  host.innerHTML=head+'<div class="plist">'+rows+'</div>';
  host.querySelectorAll(".slot.free").forEach(function(b){b.onclick=function(){
    var p=profsInDept().filter(function(x){return x.name===b.dataset.p;})[0];
    var key=S.selDate+"|"+b.dataset.s+"|"+h.id+"|"+p.name,bk=apptIndex()[key];
    if(bk)openModal(bk);else openModal({hospitalId:h.id,hospitalName:h.name,dept:p.department,professor:p.name,slot:b.dataset.s,date:S.selDate});
  };});
}
function statusColor(s){return s==="done"?"#059669":s==="canceled"?"#94a3b8":"#2563eb";}

/* ---------- 내 캘린더 ---------- */
function renderCalendar(main){
  var title;
  if(S.calView==="week"){var s=startWeek(S.calCursor),e=addDays(s,6);title=(s.getMonth()+1)+"/"+s.getDate()+" – "+(e.getMonth()+1)+"/"+e.getDate();}
  else title=S.calCursor.getFullYear()+"년 "+(S.calCursor.getMonth()+1)+"월";
  main.innerHTML=
    '<div class="calbar">'+
      '<div style="display:flex;align-items:center;gap:4px">'+
        '<button class="navbtn" id="prev">‹</button><div class="caltitle">'+esc(title)+'</div><button class="navbtn" id="next">›</button>'+
        '<button class="btn soft" id="today" style="margin-left:6px;padding:6px 10px">오늘</button></div>'+
      '<div style="display:flex;gap:8px;align-items:center">'+
        '<div class="seg"><button id="vw-week" class="'+(S.calView==="week"?"on":"")+'">주</button><button id="vw-month" class="'+(S.calView==="month"?"on":"")+'">월</button></div>'+
        '<button class="btn brand" id="newappt">+ 일정</button></div>'+
    '</div><div id="calhost"></div>';
  document.getElementById("prev").onclick=function(){move(-1);};
  document.getElementById("next").onclick=function(){move(1);};
  document.getElementById("today").onclick=function(){S.calCursor=new Date();render();};
  document.getElementById("vw-week").onclick=function(){S.calView="week";render();};
  document.getElementById("vw-month").onclick=function(){S.calView="month";render();};
  document.getElementById("newappt").onclick=function(){var h=curHospital()||{};openModal({hospitalId:h.id||"",hospitalName:h.name||"",dept:S.dept,professor:"",date:todayYmd(),slot:"AM"});};
  if(S.calView==="week")renderWeek();else renderMonth();
}
function move(n){if(S.calView==="week")S.calCursor=addDays(S.calCursor,n*7);else S.calCursor=new Date(S.calCursor.getFullYear(),S.calCursor.getMonth()+n,1);render();}
function byDate(){var m={};S.appts.forEach(function(a){(m[a.date]=m[a.date]||[]).push(a);});Object.keys(m).forEach(function(k){m[k].sort(function(a,b){return a.slot<b.slot?-1:1;});});return m;}
function badge(st){var b=STATUS[st]||STATUS.planned;return '<span class="badge '+b[1]+'"><span class="d"></span>'+b[0]+'</span>';}

function renderWeek(){
  var host=document.getElementById("calhost"),s=startWeek(S.calCursor),m=byDate(),html='<div class="week">';
  for(var i=0;i<7;i++){
    var d=addDays(s,i),ymd=fmt(d),list=m[ymd]||[],today=ymd===todayYmd();
    html+='<div class="day'+(today?" today":"")+'"><h4>'+(DAY_KO[DAYS[monIdx(d)]]||"일")+" "+d.getDate()+'</h4>';
    list.forEach(function(a){html+='<button class="appt" data-id="'+a.id+'"><div class="t">'+esc(a.title)+'</div>'+
      '<div class="m"><span class="slotlab">'+(a.slot==="AM"?"오전":"오후")+'</span>'+badge(a.status)+'</div></button>';});
    html+='</div>';
  }
  html+='</div>';host.innerHTML=html;
  host.querySelectorAll(".appt").forEach(function(b){b.onclick=function(){openModal(findAppt(b.dataset.id));};});
}
function renderMonth(){
  var host=document.getElementById("calhost"),first=new Date(S.calCursor.getFullYear(),S.calCursor.getMonth(),1);
  var gs=startWeek(first),m=byDate();
  var html='<div class="month"><div class="mhead">'+["월","화","수","목","금","토","일"].map(function(x){return "<div>"+x+"</div>";}).join("")+'</div><div class="mgrid">';
  for(var i=0;i<42;i++){
    var d=addDays(gs,i),ymd=fmt(d),list=m[ymd]||[],inM=d.getMonth()===S.calCursor.getMonth(),today=ymd===todayYmd();
    html+='<div class="mcell'+(inM?"":" out")+(today?" today":"")+'"><div class="dn">'+d.getDate()+'</div>';
    list.slice(0,3).forEach(function(a){html+='<button class="mline" data-id="'+a.id+'"><span class="d" style="background:'+statusColor(a.status)+'"></span><span>'+esc(a.title)+'</span></button>';});
    if(list.length>3)html+='<div style="font-size:10px;color:#94a3b8">+'+(list.length-3)+'</div>';
    html+='</div>';
  }
  html+='</div></div>';host.innerHTML=html;
  host.querySelectorAll(".mline").forEach(function(b){b.onclick=function(){openModal(findAppt(b.dataset.id));};});
}
function findAppt(id){return S.appts.filter(function(a){return a.id===id;})[0];}

/* ---------- 모달 ---------- */
function openModal(init){
  var f=Object.assign({id:null,hospitalId:"",hospitalName:"",dept:"",professor:"",date:todayYmd(),slot:"AM",title:"",status:"planned",memo:""},init);
  if(!f.title)f.title=f.professor?(f.professor+" 교수 면담"):"영업 면담";
  var statusVal=f.status;
  var ctx=[f.hospitalName,f.dept,f.professor?(f.professor+" 교수"):""].filter(Boolean).join(" · ");
  var mr=document.getElementById("modal-root");
  mr.innerHTML='<div class="overlay" id="ov"><div class="modal">'+
    '<button class="mclose" id="mx">×</button><h3>'+(f.id?"면담 일정 수정":"면담 일정 등록")+'</h3>'+
    '<div class="mctx">'+esc(ctx)+'</div>'+
    '<label class="fl"><span>제목</span><input id="m-title" value="'+esc(f.title)+'"></label>'+
    '<div class="two"><label class="fl"><span>날짜</span><input id="m-date" type="date" value="'+esc(f.date)+'"></label>'+
      '<label class="fl"><span>시간대</span><select id="m-slot"><option value="AM"'+(f.slot==="AM"?" selected":"")+'>오전</option><option value="PM"'+(f.slot==="PM"?" selected":"")+'>오후</option></select></label></div>'+
    '<div class="fl"><span>상태</span><div class="statusrow" id="m-status">'+
      Object.keys(STATUS).map(function(k){return '<button data-k="'+k+'" class="'+STATUS[k][2]+(k===statusVal?" on":"")+'">'+STATUS[k][0]+'</button>';}).join("")+'</div></div>'+
    '<label class="fl"><span>메모</span><textarea id="m-memo" rows="2" placeholder="면담 목적, 연락처 등">'+esc(f.memo)+'</textarea></label>'+
    '<div class="mfoot">'+(f.id?'<button class="btn ghost" id="m-del" style="color:#e11d48">삭제</button>':'')+
      '<div style="flex:1"></div><button class="btn soft" id="m-cancel">취소</button><button class="btn brand" id="m-save">저장</button></div>'+
    '</div></div>';
  function close(){mr.innerHTML="";}
  document.getElementById("ov").onclick=function(e){if(e.target.id==="ov")close();};
  document.getElementById("mx").onclick=close;
  document.getElementById("m-cancel").onclick=close;
  document.getElementById("m-status").querySelectorAll("button").forEach(function(b){b.onclick=function(){
    statusVal=b.dataset.k;
    document.getElementById("m-status").querySelectorAll("button").forEach(function(x){x.className=STATUS[x.dataset.k][2]+(x.dataset.k===statusVal?" on":"");});
  };});
  if(f.id)document.getElementById("m-del").onclick=function(){S.appts=S.appts.filter(function(a){return a.id!==f.id;});saveAppts();close();render();};
  document.getElementById("m-save").onclick=function(){
    var obj={id:f.id||uid(),hospitalId:f.hospitalId,hospitalName:f.hospitalName,dept:f.dept,professor:f.professor,
      date:document.getElementById("m-date").value,slot:document.getElementById("m-slot").value,
      title:document.getElementById("m-title").value.trim()||"영업 면담",status:statusVal,memo:document.getElementById("m-memo").value.trim()};
    var i=S.appts.map(function(a){return a.id;}).indexOf(obj.id);
    if(i>=0)S.appts[i]=obj;else S.appts.push(obj);
    saveAppts();close();render();
  };
}
</script>
